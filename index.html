<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (v3) CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'sans-serif'],
            },
            boxShadow: {
              'glow-blue': '0 0 15px -3px rgba(59, 130, 246, 0.2), 0 4px 6px -2px rgba(59, 130, 246, 0.1)',
              'glow-violet': '0 0 15px -3px rgba(139, 92, 246, 0.2), 0 4px 6px -2px rgba(139, 92, 246, 0.1)',
              'glow-emerald': '0 0 15px -3px rgba(16, 185, 129, 0.2), 0 4px 6px -2px rgba(16, 185, 129, 0.1)',
              'glow-teal': '0 0 15px -3px rgba(20, 184, 166, 0.2), 0 4px 6px -2px rgba(20, 184, 166, 0.1)',
              'glow-amber': '0 0 15px -3px rgba(245, 158, 11, 0.2), 0 4px 6px -2px rgba(245, 158, 11, 0.1)',
              'glow-pink': '0 0 15px -3px rgba(236, 72, 153, 0.2), 0 4px 6px -2px rgba(236, 72, 153, 0.1)',
            }
          }
        }
      }
    </script>

    <!-- Custom CSS Styles -->
    <style type="text/css">
      /* Chrome/Safari Scrollbars */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      .dark ::-webkit-scrollbar-track {
        background: #0f172a;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 9999px;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #334155;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      .dark ::-webkit-scrollbar-thumb:hover {
        background: #475569;
      }

      /* Custom print rules */
      @media print {
        body {
          background: white !important;
          color: black !important;
        }
        .no-print {
          display: none !important;
        }
        .print-only {
          display: block !important;
        }
      }
    </style>

    <title>VidyaFrame Prompt Studio — AI Image Prompt Generator</title>
  </head>
  <body class="transition-colors duration-200 antialiased font-sans bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-100 min-h-screen flex flex-col selection:bg-indigo-500/20">
    
    <!-- 1. Header Section -->
    <header id="app-header" class="w-full py-5 px-6 border-b border-slate-200/50 dark:border-slate-800/50 bg-white/70 dark:bg-slate-950/70 backdrop-blur-md sticky top-0 z-40 no-print">
      <!-- Injected by app.js -->
    </header>

    <!-- 2. Main content container -->
    <main class="flex-grow w-full max-w-7xl mx-auto px-4 py-6 md:px-6 no-print">
      
      <!-- Progress Dashboard Gauges -->
      <section id="app-dashboard">
        <!-- Injected by app.js -->
      </section>

      <!-- Sidebar and Grid Area -->
      <div class="flex flex-col md:flex-row gap-6 items-start mt-4">
        
        <!-- Mobile Accordion Filters -->
        <div id="app-sidebar" class="md:hidden w-full mb-4">
          <!-- Injected by app.js -->
        </div>

        <!-- Desktop Left Sidebar -->
        <aside id="desktop-sidebar" class="hidden md:block w-72 flex-shrink-0 p-6 rounded-2xl border border-slate-200/50 dark:border-slate-800/50 bg-white/50 dark:bg-slate-900/50 backdrop-blur-md self-start">
          <!-- Injected by app.js -->
        </aside>

        <!-- Right Content Cards Grid -->
        <div class="flex-grow w-full">
          <div class="flex items-center justify-between mb-4 px-1">
            <p id="grid-info-bar" class="text-xs font-bold text-slate-400 uppercase tracking-wider">
              Loading Topics...
            </p>
          </div>

          <div id="app-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
            <!-- Injected by app.js -->
          </div>
        </div>

      </div>

    </main>

    <!-- 3. Prompt panel drawer (Slides in from the right) -->
    <aside id="app-panel" class="fixed inset-0 z-50 transition-transform duration-300 translate-x-full no-print">
      <!-- Injected by app.js -->
    </aside>

    <!-- 4. Global Copy Feedback Toast -->
    <div id="app-toast" class="fixed bottom-6 right-6 z-50 hidden no-print">
      <!-- Injected by app.js -->
    </div>

    <!-- 5. Reset All Confirmation Modal -->
    <div id="reset-modal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 overflow-y-auto bg-slate-900/60 backdrop-blur-sm no-print">
      <div class="relative w-full max-w-md overflow-hidden rounded-2xl border border-slate-200/80 dark:border-slate-800/80 bg-white dark:bg-slate-900 shadow-2xl p-6">
        <h3 class="text-lg font-semibold text-slate-900 dark:text-white mb-2">Reset All Progress</h3>
        <p class="text-sm text-slate-600 dark:text-slate-400 leading-relaxed mb-6">
          Are you sure you want to clear all copied indicators? This will wipe out all ticks (<span class="text-emerald-500 font-bold">✅</span>) on your cards, and reset the dashboard counters to 0.
        </p>
        <div class="flex items-center justify-end gap-3">
          <button id="modal-cancel-btn" class="px-4 py-2 text-xs font-semibold text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-colors">
            Cancel
          </button>
          <button id="modal-confirm-btn" class="px-4 py-2 text-xs font-semibold text-white bg-rose-600 hover:bg-rose-700 rounded-xl shadow-md shadow-rose-500/10 transition-all">
            Yes, Reset Progress
          </button>
        </div>
      </div>
    </div>

    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- ES Module App Script -->
    <script type="module" src="app.js"></script>
  </body>
</html>
